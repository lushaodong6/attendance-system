<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改学生 - 学生管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 550px;
      max-width: 100%;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      white-space: pre-line;
    }

    .alert-error {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #feb2b2;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #4a5568;
      font-weight: 600;
      font-size: 14px;
    }

    .required::after {
      content: " *";
      color: #e53e3e;
    }

    input[type="text"],
    input[type="date"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #f5576c;
      box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
    }

    .radio-group {
      display: flex;
      gap: 20px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: normal;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .btn-submit {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-back {
      background: #718096;
      color: white;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>✏️ 修改学生信息</h2>

  <!-- 错误提示 -->
  <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

  <form action="/student/update" method="post">
    <input type="hidden" name="id" th:value="${student.id}">

    <div class="form-group">
      <label class="required">学号</label>
      <input type="text" name="studentNo" th:value="${student.studentNo}"
             placeholder="请输入学号" required>
    </div>

    <div class="form-group">
      <label class="required">姓名</label>
      <input type="text" name="name" th:value="${student.name}" required>
    </div>

    <div class="form-group">
      <label class="required">性别</label>
      <div class="radio-group">
        <label>
          <input type="radio" name="gender" value="男"
                 th:checked="${student.gender == '男'}"> 男
        </label>
        <label>
          <input type="radio" name="gender" value="女"
                 th:checked="${student.gender == '女'}"> 女
        </label>
      </div>
    </div>

    <div class="form-group">
      <label class="required">出生日期</label>
      <input type="date" name="birthDate" th:value="${student.birthDate}" required>
    </div>

    <div class="form-group">
      <label>联系方式</label>
      <input type="tel" name="phone" th:value="${student.phone}" placeholder="手机号">
    </div>

    <div class="form-group">
      <label>邮箱</label>
      <input type="email" name="email" th:value="${student.email}" placeholder="邮箱">
    </div>

    <div class="form-group">
      <label>地址</label>
      <input type="text" name="address" th:value="${student.address}" placeholder="地址">
    </div>

    <div class="btn-group">
      <button type="submit" class="btn btn-submit">✅ 更新信息</button>
      <a href="/student/list" class="btn btn-back">↩ 返回列表</a>
    </div>
  </form>
</div>
</body>
</html>
